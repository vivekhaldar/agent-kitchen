<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Kitchen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <h1 class="header-title">AGENT KITCHEN</h1>
    </div>
    <div class="header-right">
      <span class="last-scan" id="last-scan">Last scan: --</span>
      <label class="scan-days-label">
        <input type="number" id="scan-days" class="scan-days-input" value="7" min="1" max="365">
        <span class="scan-days-suffix">days</span>
      </label>
      <button class="btn-refresh" id="btn-refresh" title="Refresh">Refresh</button>
    </div>
  </header>

  <div class="filter-bar" id="filter-bar">
    <div class="time-slider-row">
      <span class="time-slider-label" id="time-slider-label">All time</span>
      <input type="range" id="time-slider" class="time-slider" min="1" max="60" value="60">
    </div>
  </div>

  <main class="content" id="content">
    <div class="loading" id="loading">Loading sessions...</div>

    <!-- Repo groups rendered here by app.js -->
    <div id="repo-groups"></div>

    <!-- Non-repo groups rendered here by app.js -->
    <div id="non-repo-groups"></div>

    <!-- Flat chronological view (hidden by default) -->
    <div id="chrono-view" class="hidden"></div>

    <!-- Empty state -->
    <div id="empty-state" class="empty-state hidden">
      No sessions found. Make sure <code>~/.claude</code> or <code>~/.codex</code> directories exist.
    </div>
  </main>

  <div id="search-overlay" class="search-overlay hidden">
    <div class="search-box">
      <div class="search-input-row">
        <span class="search-icon">/</span>
        <input type="text" id="search-input" class="search-input"
               placeholder="Search sessions..." autocomplete="off" spellcheck="false">
        <kbd class="search-hint">esc</kbd>
      </div>
      <div class="search-results" id="search-results"></div>
    </div>
  </div>

  <div id="terminal-panel" class="terminal-panel hidden">
    <div class="terminal-panel-header">
      <div class="terminal-tabs" id="terminal-tabs"></div>
      <button class="terminal-panel-close" id="terminal-close">&times;</button>
    </div>
    <div id="terminal-container"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
